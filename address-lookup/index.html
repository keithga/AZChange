<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AZ Change | Address Lookup</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Address Lookup</h1>
    <p>Enter your address or use your location to find your districts and voter cards.</p>
  </header>

  <main class="container">
    <form id="address-form" class="lookup-form" autocomplete="off">
      <label for="address-input">Address</label>
      <div class="address-row">
        <input id="address-input" name="address" type="text" placeholder="1234 S Main Street, Tucson, AZ" required />
        <button type="button" id="gps-button">Use My Location</button>
      </div>
      <ul id="suggestions" class="suggestions" aria-live="polite"></ul>
      <button type="submit" class="button">Find My Districts</button>
    </form>

    <section id="lookup-status" class="status" aria-live="polite"></section>

    <section>
      <h2>Your Districts</h2>
      <ul id="district-list" class="district-list"></ul>
    </section>

    <section>
      <h2>Candidates & Initiatives</h2>
      <div id="card-grid" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <a href="/address-lookup/">Address Lookup</a>
    <p class="disclaimer">Placeholder content for voter education only. Verify official information with Arizona election authorities.</p>
  </footer>

  <script src="/assets/app.js" defer></script>
</body>
</html>
